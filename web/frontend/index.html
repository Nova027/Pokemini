<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokemini</title>
    <link rel="icon" type="image/png" href="/static/pokeball.png">
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div id="view-home" class="page-shell">
      <header class="hero">
        <p class="eyebrow">PokeMini - Pokemon Battles</p>
        <h1>Home</h1>
        <p class="intro">
          A lite version of basic Pokemon battles with simplified versions of actual pokemon, and limited mechanics.
        </p>
      </header>

      <section class="section-block">
        <h2>My Pokemon</h2>
        <div class="button-group" role="navigation" aria-label="My Pokemon">
          <button data-route="/team">Build Team</button>
          <button data-route="/train">Train Team</button>
          <button data-route="/fetch">Fetch Team by ID</button>
        </div>
      </section>

      <section class="section-block">
        <h2>Battle</h2>
        <div class="button-group" role="navigation" aria-label="Battle">
          <div class="route-card">
            <h3><button data-route="/lobby">New Battle Room</button></h3>
            <p>Set up a private Single/Double Battle</p>
          </div>
          <div class="route-card">
            <h3><button data-route="/lobby">Join Battle Room</button></h3>
            <p>Route modules keep the app organized.</p>
          </div>
          <div class="route-card">
            <h3><button data-route="/battles">Battle Data</button></h3>
            <p>Route modules keep the app organized.</p>
          </div>
        </div>
      </section>

      <section class="section-block">
        <h2>More</h2>
        <div class="button-group" role="navigation" aria-label="More">
          <button data-route="/settings">None</button>
          <button data-route="/settings">None</button>
        </div>
      </section>
    </div>

    <div id="view-dynamic" class="dynamic-shell">
      <div id="dynamic-content"></div>
    </div>

    <!-- <div id="status" class="status" aria-live="polite">
      Click a button.
    </div> -->

    <script type="module" src="/static/script.js"></script>
  </body>
</html>
